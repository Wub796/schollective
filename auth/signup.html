<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — Schollective</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at top right, rgba(212, 146, 42, 0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(61, 122, 107, 0.05), transparent);
        }
        .auth-card {
            width: 100%;
            max-width: 500px;
            background: rgba(17, 34, 64, 0.7);
            border: 1px solid rgba(212, 146, 42, 0.16);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(24px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            animation: fadeUp 0.8s ease both;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            font-family: var(--serif);
            font-size: 2.2rem;
            font-weight: 300;
            color: var(--ivory);
            margin-bottom: 0.5rem;
        }
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .role-option {
            background: rgba(26, 58, 92, 0.3);
            border: 1px solid rgba(155, 175, 192, 0.1);
            border-radius: 12px;
            padding: 1.25rem;
            cursor: none;
            text-align: center;
            transition: all 0.3s var(--ease);
        }
        .role-option.active {
            border-color: var(--amber);
            background: rgba(212, 146, 42, 0.08);
        }
        .role-option:hover:not(.active) {
            border-color: rgba(155, 175, 192, 0.3);
            background: rgba(26, 58, 92, 0.5);
        }
        .role-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .role-label {
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--ivory);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .form-control {
            width: 100%;
            background: rgba(26, 58, 92, 0.4);
            border: 1px solid rgba(155, 175, 192, 0.15);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: var(--ivory);
            font-family: var(--sans);
            font-size: 0.9rem;
            transition: all 0.3s var(--ease);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--amber);
            background: rgba(26, 58, 92, 0.6);
        }
        .btn-submit {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
        }
        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--amber);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- CUSTOM CURSOR -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="../index.html" style="text-decoration: none; display: inline-block; margin-bottom: 1rem;">
                    <div class="nav-wordmark" style="font-size: 1.6rem;">Schol<span>lective</span></div>
                </a>
                <h1>Create account</h1>
                <p style="font-size: 0.85rem; color: var(--text-muted);">Join a community of academic growth.</p>
            </div>

            <div class="role-selector">
                <div class="role-option active" onclick="setRole('student')">
                    <div class="role-icon">🎓</div>
                    <div class="role-label">Student</div>
                </div>
                <div class="role-option" onclick="setRole('professor')">
                    <div class="role-icon">🧑‍🏫</div>
                    <div class="role-label">Professor</div>
                </div>
            </div>

            <form action="#">
                <div class="form-row">
                    <div class="form-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" class="form-control" placeholder="Jane" required>
                    </div>
                    <div class="form-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" class="form-control" placeholder="Doe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Institutional Email</label>
                    <input type="email" id="email" class="form-control" placeholder="jane.doe@university.edu" required>
                </div>
                <div class="form-group" id="prof-field" style="display: none;">
                    <label for="institution">Current Institution</label>
                    <input type="text" id="institution" class="form-control" placeholder="e.g. Stanford University">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.4;">
                    By creating an account, you agree to our <a href="#" style="color: var(--amber);">Terms of Service</a> and <a href="#" style="color: var(--amber);">Privacy Policy</a>.
                </p>
                <button type="submit" class="btn-primary btn-submit" id="submit-btn">Sign Up as Student</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log in here</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/core.js"></script>
    <script>
        function setRole(role) {
            const options = document.querySelectorAll('.role-option');
            options.forEach(opt => opt.classList.remove('active'));
            
            const selected = event.currentTarget;
            selected.classList.add('active');

            const profField = document.getElementById('prof-field');
            const submitBtn = document.getElementById('submit-btn');

            if (role === 'professor') {
                profField.style.display = 'block';
                submitBtn.textContent = 'Apply as Professor';
            } else {
                profField.style.display = 'none';
                submitBtn.textContent = 'Sign Up as Student';
            }
        }
    </script>
</body>
</html>
